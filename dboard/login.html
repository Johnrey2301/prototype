<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Real Estate System</title>
    <link rel="stylesheet" href="../login.css">
</head>
<body>
   

    <div class="login-container">
        <h2>Sign In</h2>

        <div id="auth-message" style="display:none;"></div>

        <form id="login-form" action="#" method="POST">
            <input type="email" name="email" id="email" placeholder="Email" required>

            <input type="password" name="password" id="password" placeholder="Password" required>
            <button type="submit">Login</button>

            <div style="margin-top: 10px; text-align:center; color: var(--muted); font-weight: 600;">
                Don’t have an account?
                <a href="signup.html" style="color: var(--primary); text-decoration: none;">Sign up</a>
            </div>
        </form>
    </div>
<script>
// Simple JS login handler

</script>
</body>
</html>
