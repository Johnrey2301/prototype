<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Real Estate System</title>
    <link rel="stylesheet" href="../login.css">
</head>
<body>
    <div class="login-container">
        <div id="auth-message" style="display:none;"></div>

        <form action="../php/signup.php" method="POST">
            <h2>Sign Up</h2>

            <input type="text" name="firstname" placeholder="Firstname" required>
            <input type="text" name="lastname" placeholder="Lastname" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="text" name="phonenumber" placeholder="Phone number" required>

            <input type="password" name="password" placeholder="Password" required>
            <input type="password" name="password2" placeholder="Re-enter Password" required>

            <button type="submit">Create Account</button>

            <div style="margin-top: 10px; text-align:center; color: var(--muted); font-weight: 600;">
                Already have an account?
                <a href="../dboard/login.html" style="color: var(--primary); text-decoration: none;">Sign in</a>
            </div>
        </form>
    </div>

    <script src="./js/auth.js" defer></script>
</body>
</html>
